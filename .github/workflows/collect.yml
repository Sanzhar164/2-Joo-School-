name: Сбор отзывов 2ГИС

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python collect.py
      - name: Save data.json
        run: |
          git config user.name "joo-bot"
          git config user.email "bot@joo.local"
          git add data.json
          git commit -m "Обновление отзывов" || echo "нет изменений"
          git push
